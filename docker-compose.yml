services:
  slideagent-web:
    build: .
    container_name: lecture-note-agent
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-lectureai}
      - MINIO_SECURE=false
    volumes:
      - ./data:/app/data
    depends_on:
      - minio
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lecture-note-minio
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio-data:
