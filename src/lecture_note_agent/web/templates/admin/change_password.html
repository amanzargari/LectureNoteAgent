{% extends "base.html" %}
{% block title %}Change Password — Admin — LectureNote AI{% endblock %}
{% block page_title %}Change Admin Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0"><i class="fa-solid fa-key me-2 text-warning"></i>Change Password</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="8" />
            <div class="form-text">Minimum 8 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8" />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="fa-solid fa-key me-2"></i>Change Password
            </button>
            <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
