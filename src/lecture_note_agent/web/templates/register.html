{% extends "base.html" %}
{% block title %}Register — LectureNote AI{% endblock %}

{% block auth_content %}
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <i class="fa-solid fa-user-plus"></i>
    </div>
    <h1 class="login-title">LectureNote AI</h1>
    <p class="login-subtitle">Request an account</p>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label text-muted small">Username <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user fa-sm"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username"
                 autofocus autocomplete="username" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Email <span class="text-muted small">(optional)</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope fa-sm"></i></span>
          <input type="email" name="email" class="form-control" placeholder="your@email.com"
                 autocomplete="email" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock fa-sm"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Min 8 characters"
                 autocomplete="new-password" required minlength="8" />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small">Confirm Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock fa-sm"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password"
                 autocomplete="new-password" required minlength="8" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-login">
        <i class="fa-solid fa-paper-plane me-2"></i>Submit Registration Request
      </button>
    </form>

    <p class="text-center text-muted small mt-3 mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-primary">Sign in</a>
    </p>
    <p class="text-center text-muted small mt-2 mb-0">
      <i class="fa-solid fa-circle-info me-1"></i>Your request will be reviewed by an admin before access is granted.
    </p>
  </div>
</div>
{% endblock %}
